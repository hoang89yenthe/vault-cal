name: vault_cal
description: "Flutter base project - Clean Architecture with Bloc/Cubit."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7

  # Navigation
  go_router: ^16.0.0

  # Dependency injection
  get_it: ^8.0.3

  # Network
  dio: ^5.8.0

  # Local storage
  shared_preferences: ^2.5.3

  # Security & crypto
  cryptography: ^2.7.0
  flutter_secure_storage: ^9.2.2
  local_auth: ^2.3.0

  # Encrypted metadata database
  drift: ^2.28.0
  sqlcipher_flutter_libs: ^0.6.4
  sqlite3: ^2.4.6

  # Media import & processing
  image_picker: ^1.1.2
  file_picker: ^10.0.0
  flutter_image_compress: ^2.3.0
  fc_native_video_thumbnail: ^0.16.1

  # Media viewing
  video_player: ^2.9.2
  photo_view: ^0.15.0
  open_filex: ^4.5.0

  # Intruder selfie
  camera: ^0.11.0
  permission_handler: ^12.0.0

  # Utils
  path_provider: ^2.1.4
  path: ^1.9.0
  uuid: ^4.5.1
  intl: any
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  bloc_test: ^10.0.0
  mocktail: ^1.0.4
  drift_dev: ^2.28.0
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
